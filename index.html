<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>华东区域政策日报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1F4E79;--red:#C00000;--orange:#ED7D31;--green:#27AE60;--gray:#888;--bg:#F5F7FA;--card:#FFF;--border:#E8ECF1;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:#333;-webkit-font-smoothing:antialiased;padding-bottom:80px}

/* Header */
.header{background:linear-gradient(135deg,#1F4E79 0%,#2E6EA6 100%);color:#fff;padding:20px 16px 16px;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:700;letter-spacing:1px}
.header .subtitle{font-size:12px;opacity:.7;margin-top:4px}
.header .date-nav{margin-top:12px}
.date-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:.2s}
.date-btn:active{transform:scale(.95)}
.date-btn .arrow{font-size:10px;transition:.2s}
.date-btn.open .arrow{transform:rotate(180deg)}

/* Date Picker */
.date-picker-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200}
.date-picker-mask.show{display:block}
.date-picker{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:210;max-height:60vh;overflow:hidden;transform:translateY(100%);transition:transform .3s ease}
.date-picker.show{display:block;transform:translateY(0)}
.dp-header{padding:16px;font-size:15px;font-weight:700;color:var(--blue);border-bottom:1px solid var(--border);text-align:center}
.dp-list{overflow-y:auto;max-height:calc(60vh - 52px);padding-bottom:env(safe-area-inset-bottom)}
.dp-item{padding:14px 20px;font-size:14px;color:#333;border-bottom:1px solid #F5F5F5;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.15s}
.dp-item:active{background:#F5F7FA}
.dp-item.active{color:var(--blue);font-weight:600}
.dp-item.active::after{content:"✓";color:var(--blue);font-weight:700}
.dp-item .dp-weekday{font-size:12px;color:var(--gray)}

/* Filters */
.filters{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:88px;background:var(--bg);z-index:90}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;color:#666;cursor:pointer;transition:.2s;white-space:nowrap}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip:active{transform:scale(.95)}

/* Stats Bar */
.stats{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stats::-webkit-scrollbar{display:none}
.stat-item{flex-shrink:0;background:#fff;border-radius:10px;padding:10px 14px;min-width:80px;text-align:center;border:1px solid var(--border)}
.stat-item .num{font-size:22px;font-weight:700;color:var(--blue)}
.stat-item .label{font-size:10px;color:var(--gray);margin-top:2px}

/* Section */
.section{padding:0 16px;margin-top:16px}
.section-title{font-size:15px;font-weight:700;color:var(--blue);padding:8px 0;display:flex;align-items:center;gap:6px;position:sticky;top:130px;background:var(--bg);z-index:80}
.section-title .badge{background:var(--blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}

/* Card */
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border);transition:.2s}
.card.top-card{border-left:3px solid var(--red)}
.card.new-card{border-left:3px solid var(--orange)}
.card.backfill-card{border-left:3px dashed var(--gray)}
.personnel-block.backfill{border-left:3px dashed var(--gray)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-title{font-size:14px;font-weight:600;line-height:1.5;flex:1}
.card-tags{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;white-space:nowrap}
.tag-high{background:#FEE;color:var(--red)}
.tag-mid{background:#FFF3E0;color:var(--orange)}
.tag-low{background:#F0F4F8;color:var(--gray)}
.tag-new{background:#E3F2FD;color:#1565C0}
.tag-province{background:#E8F5E9;color:#2E7D32}
.card-body{margin-top:8px;font-size:12px;color:#666;line-height:1.7}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:11px;color:var(--gray)}
.card-meta span{display:flex;align-items:center;gap:3px}
.card-action{margin-top:8px;padding:8px 10px;background:#F8FAFC;border-radius:8px;font-size:12px;color:var(--blue);line-height:1.5}
.card-link{display:inline-block;margin-top:6px;font-size:11px;color:var(--blue);text-decoration:none;opacity:.8}
.card-link:active{opacity:1}

/* Alert Table */
.alert-list{margin-bottom:10px}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:.15s}
.alert-item:active{background:#F5F7FA;transform:scale(.99)}
.alert-level{flex-shrink:0;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.alert-level.l1{background:#FEE;color:var(--red)}
.alert-level.l2{background:#FFF3E0;color:var(--orange)}
.alert-level.l3{background:#E3F2FD;color:var(--blue)}
.alert-content{flex:1}
.alert-content .a-title{font-size:13px;font-weight:600}
.alert-content .a-desc{font-size:11px;color:var(--gray);margin-top:2px}
.alert-content .a-arrow{font-size:10px;color:var(--blue);margin-top:3px;opacity:.5}

/* Highlight animation */
@keyframes highlightPulse{0%{box-shadow:0 0 0 0 rgba(31,78,121,.4)}50%{box-shadow:0 0 0 8px rgba(31,78,121,.1)}100%{box-shadow:0 0 0 0 rgba(31,78,121,0)}}
.card.highlight,.personnel-block.highlight,.comp-card.highlight{animation:highlightPulse .8s ease 2;border-color:var(--blue)}

/* Competitor */
.comp-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.comp-name{font-size:13px;font-weight:700;color:var(--blue)}
.comp-title{font-size:13px;font-weight:700;color:var(--dark);line-height:1.5}
.comp-text{font-size:12px;color:#555;margin-top:4px;line-height:1.6}

/* Event */
.event-item{display:flex;gap:10px;padding:10px 14px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.event-date{flex-shrink:0;text-align:center;min-width:54px}
.event-date .day{font-size:18px;font-weight:700;color:var(--blue)}
.event-date .month{font-size:10px;color:var(--gray)}
.event-info .e-name{font-size:13px;font-weight:600}
.event-info .e-loc{font-size:11px;color:var(--gray);margin-top:2px}
.event-info .e-note{font-size:11px;color:#555;margin-top:2px}

/* Leader Activities */
.leader-province-title{font-size:13px;font-weight:700;color:var(--blue);margin:12px 0 6px;padding-left:2px}
.leader-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);border-left:3px solid #7C3AED}
.leader-card-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.leader-name{font-size:14px;font-weight:700;color:#333}
.leader-role{font-size:11px;color:var(--gray);background:#F5F5F5;padding:1px 6px;border-radius:4px}
.leader-type{font-size:11px;color:#7C3AED;font-weight:500}
.leader-card-title{font-size:13px;color:#333;margin-top:6px;line-height:1.5;font-weight:500}
.leader-card-counter{font-size:12px;color:#666;margin-top:4px}
.leader-card-summary{font-size:11px;color:var(--gray);margin-top:4px;line-height:1.5}

/* Personnel */
.personnel-block{background:#fff;border-radius:var(--radius);margin-bottom:12px;border:1px solid var(--border);overflow:hidden}
.personnel-header{padding:12px 14px;background:linear-gradient(135deg,#1F4E79,#2E6EA6);color:#fff}
.personnel-header .p-title{font-size:14px;font-weight:600}
.personnel-header .p-meta{font-size:11px;opacity:.8;margin-top:3px;display:flex;gap:8px}
.p-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.p-section:last-child{border-bottom:none}
.p-section-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.p-section-title .p-count{background:var(--blue);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500}
.p-table{width:100%;border-collapse:collapse}
.p-table th{text-align:left;font-size:11px;color:var(--gray);font-weight:500;padding:4px 0;border-bottom:1px solid var(--border)}
.p-table td{font-size:12px;padding:6px 0;border-bottom:1px solid #F5F5F5;vertical-align:top}
.p-table td:first-child{font-weight:600;width:70px;color:var(--blue)}
.p-table .note{font-size:10px;color:var(--orange);margin-left:4px}
.name-link{color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue)}
.name-link:active{opacity:.6}
.p-link{display:inline-block;margin:8px 14px 12px;font-size:11px;color:var(--blue);text-decoration:none}

/* Personnel Analysis Card */
.p-analysis{margin:8px 14px 4px;padding:10px 12px;background:#F8FAFC;border-radius:8px;border:1px solid #E3EBF3;font-size:12px;line-height:1.7;color:#444}
.p-analysis-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.p-analysis-row{margin-bottom:6px}
.p-analysis-label{font-weight:600;color:#555;display:inline}
.p-analysis-impact{display:inline-block;margin-top:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.p-analysis-impact.positive{background:#E8F5E9;color:#2E7D32}
.p-analysis-impact.neutral{background:#F0F4F8;color:#666}
.p-analysis-impact.watch{background:#FFF3E0;color:var(--orange)}

/* Lock Screen */

/* Digest */
.digest-date{font-size:13px;color:var(--gray);padding:12px 16px 4px;font-weight:500}
.digest-card{background:#fff;border-radius:var(--radius);margin:4px 16px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
.digest-card:active{background:#F8FAFC;transform:scale(.99)}
.digest-card.urgent{border-left:3px solid var(--red)}
.digest-card.important{border-left:3px solid var(--orange)}
.digest-card .d-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;white-space:nowrap}
.digest-card .d-tag-alert{background:#FEE;color:var(--red)}
.digest-card .d-tag-policy{background:#E3F2FD;color:#1565C0}
.digest-card .d-tag-personnel{background:#E8F5E9;color:#2E7D32}
.digest-card .d-tag-industry{background:#F3E5F5;color:#7B1FA2}
.digest-card .d-text{flex:1;font-size:13px;font-weight:500;line-height:1.5;color:#333}
.digest-card .d-arrow{flex-shrink:0;font-size:12px;color:var(--blue);opacity:.5}
.digest-empty{text-align:center;color:var(--gray);padding:40px 16px;font-size:13px}
.digest-section{margin-top:12px}
.digest-section-title{font-size:12px;font-weight:600;color:var(--blue);padding:0 16px;margin-bottom:4px}

/* Lock Screen */
#lockScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1F4E79 0%,#2E6EA6 50%,#4A90D9 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:#fff;border-radius:20px;padding:40px 30px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lock-icon{font-size:48px;margin-bottom:16px}
.lock-title{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:6px}
.lock-desc{font-size:12px;color:var(--gray);margin-bottom:24px}
.lock-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;text-align:center;transition:.2s}
.lock-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,78,121,.1)}
.lock-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;margin-top:12px;cursor:pointer;transition:.2s}
.lock-btn:active{transform:scale(.97);background:#163D5E}
.lock-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;text-align:center;padding:8px 0;cursor:pointer;transition:.2s}
.tab-item.active{color:var(--blue)}
.tab-item .tab-icon{font-size:20px}
.tab-item .tab-label{font-size:10px;margin-top:2px}

/* Hide sections */
.panel{display:none}
.panel.active{display:block}

/* Empty */
.empty{text-align:center;padding:40px;color:var(--gray);font-size:13px}

/* Impact dot */
.impact-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.impact-dot.high{background:var(--red)}
.impact-dot.mid{background:var(--orange)}
.impact-dot.low{background:#CCC}
</style>
</head>
<body>

<!-- 密码锁 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2 class="lock-title">华东区域政策日报</h2>
    <p class="lock-desc">内部资料，请输入访问密码</p>
    <input type="password" id="pwdInput" class="lock-input" placeholder="请输入密码" autocomplete="off">
    <button class="lock-btn" onclick="checkPwd()">进入</button>
    <p class="lock-err" id="lockErr"></p>
  </div>
</div>

<!-- 主内容（默认隐藏） -->
<div id="mainApp" style="display:none">

<div class="header">
  <h1>📋 华东区域政策日报</h1>
  <div class="subtitle">六省一市 · 每日政策监测</div>
  <div class="date-nav" id="dateNav" style="display:flex;align-items:center;gap:10px">
    <div class="date-btn" id="dateBtn" onclick="toggleDatePicker()">
      <span id="dateBtnText">全部日期</span>
      <span class="arrow">▾</span>
    </div>
    <div class="date-btn" onclick="showExportModal()" style="background:rgba(255,255,255,.25)">
      📤 导出月报
    </div>
  </div>
</div>

<!-- 导出弹窗 -->
<div id="exportMask" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300" onclick="hideExportModal()"></div>
<div id="exportModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:24px;width:320px;z-index:310;box-shadow:0 20px 60px rgba(0,0,0,.3)">
  <h3 style="font-size:16px;font-weight:700;color:var(--blue);margin-bottom:16px">📤 导出月度政务信息</h3>
  <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">选择月份</label>
  <select id="exportMonth" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px"></select>
  <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">收件邮箱</label>
  <input type="email" id="exportEmail" placeholder="example@company.com" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:16px;outline:none">
  <button onclick="doExport()" style="width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">生成并发送</button>
  <p id="exportStatus" style="font-size:12px;color:var(--gray);margin-top:10px;text-align:center;min-height:18px"></p>
</div>

<div class="date-picker-mask" id="datePickerMask" onclick="closeDatePicker()"></div>
<div class="date-picker" id="datePicker">
  <div class="dp-header">选择日期</div>
  <div class="dp-list" id="dpList"></div>
</div>

<div id="panelDigest" class="panel active">
  <div class="section" id="digestList"></div>
</div>

<div id="panelAlert" class="panel">
  <div class="section" id="alertList"></div>
</div>

<div id="panelPolicy" class="panel">
  <div class="filters" id="provinceFilters"></div>
  <div class="stats" id="statsBar"></div>
  <div class="section" id="policyList"></div>
</div>

<div id="panelPersonnel" class="panel">
  <div class="section" id="personnelList"></div>
</div>

<div id="panelCompetitor" class="panel">
  <div class="section" id="compList"></div>
</div>

<div id="panelEvent" class="panel">
  <div class="section" id="eventList"></div>
</div>

<div id="panelLeader" class="panel">
  <div class="section" id="leaderList"></div>
</div>

<div class="tab-bar">
  <div class="tab-item active" data-panel="panelDigest" onclick="switchTab(this)">
    <div class="tab-icon">📰</div>
    <div class="tab-label">导读</div>
  </div>
  <div class="tab-item" data-panel="panelAlert" onclick="switchTab(this)">
    <div class="tab-icon">⚠️</div>
    <div class="tab-label">预警</div>
  </div>
  <div class="tab-item" data-panel="panelPolicy" onclick="switchTab(this)">
    <div class="tab-icon">📄</div>
    <div class="tab-label">政策</div>
  </div>
  <div class="tab-item" data-panel="panelPersonnel" onclick="switchTab(this)">
    <div class="tab-icon">👤</div>
    <div class="tab-label">人事</div>
  </div>
  <div class="tab-item" data-panel="panelCompetitor" onclick="switchTab(this)">
    <div class="tab-icon">🏢</div>
    <div class="tab-label">行业</div>
  </div>
  <div class="tab-item" data-panel="panelEvent" onclick="switchTab(this)">
    <div class="tab-icon">📅</div>
    <div class="tab-label">活动</div>
  </div>
  <div class="tab-item" data-panel="panelLeader" onclick="switchTab(this)">
    <div class="tab-icon">🏛️</div>
    <div class="tab-label">领导</div>
  </div>
</div>
</div><!-- end mainApp -->

<script>
// Password protection
var _k = 'aGRwYTIwMjY=';
function checkPwd() {
  var pwd = document.getElementById('pwdInput').value;
  if (btoa(pwd) === _k) {
    localStorage.setItem('policy_auth', _k);
    unlock();
  } else {
    document.getElementById('lockErr').textContent = '密码错误，请重试';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}
function unlock() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = '';
}
if (localStorage.getItem('policy_auth') === _k) {
  document.addEventListener('DOMContentLoaded', unlock);
}
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('pwdInput');
  if (input) input.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPwd(); });
});
</script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="data.js"></script>
<script>
// Defensive defaults
DATA.entries = DATA.entries || [];
DATA.personnel = DATA.personnel || [];
DATA.competitors = DATA.competitors || [];
DATA.alerts = DATA.alerts || [];
DATA.events = DATA.events || [];
DATA.leader_activities = DATA.leader_activities || [];

// State
var today = new Date().toISOString().slice(0, 10);
var dates = [...new Set([
  ...DATA.entries.map(e => e.date),
  ...DATA.personnel.map(p => p.date),
  ...DATA.competitors.map(c => c.date)
])].sort().reverse();
var provinces = ['全部','国家级','上海','浙江','江苏','安徽','福建','江西','湖南'];
// If today has no data, fallback to latest date with content
var currentDate;
if (dates.indexOf(today) >= 0) {
  // Check if today actually has meaningful content
  var todayEntries = DATA.entries.filter(function(e){return e.date===today;});
  var todayPersonnel = DATA.personnel.filter(function(p){return p.date===today;});
  var todayComps = DATA.competitors.filter(function(c){return c.date===today;});
  if (todayEntries.length + todayPersonnel.length + todayComps.length >= 3) {
    currentDate = today;
  } else {
    currentDate = dates[0]; // fallback to latest date with data
  }
} else {
  currentDate = dates[0];
}
var currentProvince = 'all';

// Render date picker
const weekdays = ['日','一','二','三','四','五','六'];
function renderDatePicker() {
  const el = document.getElementById('dpList');
  let html = `<div class="dp-item ${currentDate==='all'?'active':''}" onclick="pickDate('all')">全部日期</div>`;
  dates.forEach(d => {
    const dt = new Date(d);
    const label = `${d}（周${weekdays[dt.getDay()]}）`;
    const count = DATA.entries.filter(e => e.date === d).length;

// Render policy cards (sorted by importance: impact level first, then category)
function renderPolicies() {
  const entries = getFiltered();
  const el = document.getElementById('policyList');
  if (!entries.length) { el.innerHTML = '<div class="empty">暂无符合条件的政策</div>'; return; }

  // Sort all entries by importance: impact(高>中>低) → isTop → date(newest first)
  const impOrder = {'高':0,'中':1,'低':2};
  const sorted = entries.slice().sort((a,b) => {
    const ia = impOrder[a.impact] !== undefined ? impOrder[a.impact] : 3;
    const ib = impOrder[b.impact] !== undefined ? impOrder[b.impact] : 3;
    if (ia !== ib) return ia - ib;
    if (a.isTop !== b.isTop) return a.isTop ? -1 : 1;
    return b.publishDate > a.publishDate ? 1 : b.publishDate < a.publishDate ? -1 : 0;
  });
  // Assign stable index-based id for cards without id
  sorted.forEach(function(e, idx) { if (!e.id) e.id = 'entry-' + idx; });

  // Group sorted entries by impact level for display
  const impactGroups = {'高':[],'中':[],'低':[]};
  sorted.forEach(e => { (impactGroups[e.impact] || impactGroups['低']).push(e); });
  const impactLabels = [
    {key:'高',icon:'🔴',label:'高影响'},
    {key:'中',icon:'🟡',label:'中影响'},
    {key:'低',icon:'⚪',label:'低影响'}
  ];
  const categoryIcons = {'行业监管':'🔒','人工智能':'🤖','数据安全':'🛡️','数字经济':'💹','平台经济':'📱','金融监管':'💰','消费零售':'🛒','医疗健康':'🏥','教育':'📚'};

  let html = '';
  impactLabels.forEach(grp => {
    const items = impactGroups[grp.key];
    if (!items || !items.length) return;
    html += `<div class="section-title">${grp.icon} ${grp.label} <span class="badge">${items.length}</span></div>`;
    items.forEach(e => {
      const cardClass = e.isBackfill ? 'backfill-card' : e.isTop ? 'top-card' : e.isNew ? 'new-card' : '';
      const impactTag = `<span class="tag tag-${e.impact==='高'?'high':e.impact==='中'?'mid':'low'}">${e.impact}影响</span>`;
      const newTag = e.isNew ? '<span class="tag tag-new">🆕</span>' : '';
      const backfillTag = e.isBackfill ? '<span class="tag tag-low">📌补录</span>' : '';
      const provTag = e.province !== '国家级' ? `<span class="tag tag-province">${e.province}</span>` : '';
      html += `
        <div class="card ${cardClass}" data-id="${e.id}">
          <div class="card-head">
            <div class="card-title">${e.title}</div>
            <div class="card-tags">${backfillTag}${newTag}${impactTag}${provTag}</div>
          </div>
          <div class="card-body">${e.summary}</div>
          <div class="card-meta">
            <span>📌 ${e.source}</span>
            <span>📅 ${e.publishDate}</span>
            <span>📂 ${e.category||''}</span>
          </div>
          ${e.action ? `<div class="card-action">💡 ${e.action}</div>` : ''}
          ${e.url ? `<a class="card-link" href="${e.url}" target="_blank">🔗 查看原文 →</a>` : ''}
        </div>`;
    });
  });
  el.innerHTML = html;
}

// Alert jump to related content
function alertJump(idx) {
  var a = DATA.alerts[idx];
  if (!a || !a.linkType) return;

  if (a.linkType === 'url') {
    window.open(a.linkTarget, '_blank');
    return;
  }

  // Switch to target tab
  var tabMap = {policy:'panelPolicy', personnel:'panelPersonnel', competitor:'panelCompetitor'};
  var targetPanel = tabMap[a.linkType];
  if (!targetPanel) return;

  // Reset filters to show all
  currentDate = 'all';
  currentProvince = 'all';
  renderAll();

  // Activate tab
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var tabEl = document.querySelector('[data-panel="' + targetPanel + '"]');
  if (tabEl) tabEl.classList.add('active');
  var panelEl = document.getElementById(targetPanel);
  if (panelEl) panelEl.classList.add('active');

  // Find and highlight target element
  setTimeout(function() {
    var target = null;
    if (a.linkType === 'policy') {
      // Find card by entry id
      var cards = document.querySelectorAll('.card');
      cards.forEach(function(c) { if (c.getAttribute('data-id') === a.linkTarget) target = c; });
    } else if (a.linkType === 'personnel') {
      // Find personnel block by province
      var blocks = document.querySelectorAll('.personnel-block');
      blocks.forEach(function(b) { if (b.getAttribute('data-province') === a.linkTarget) target = b; });
    } else if (a.linkType === 'competitor') {
      var comps = document.querySelectorAll('.comp-card');
      comps.forEach(function(c) { if (c.getAttribute('data-name') === a.linkTarget) target = c; });
    }
    if (target) {
      target.scrollIntoView({behavior:'smooth', block:'center'});
      target.classList.add('highlight');
      setTimeout(function() { target.classList.remove('highlight'); }, 2000);
    }
  }, 100);
}

// Render events (hide ended events)
function renderEvents() {
  const el = document.getElementById('eventList');
  const now = new Date().toISOString().slice(0,10);
  // Filter: only show events whose end date >= today
  const upcoming = DATA.events.filter(e => {
    // Parse end date from time field (format: "2026.4.29-5.1" or "2026-05-20")
    var timeStr = e.time || '';
    var endDate = '';
    if (timeStr.indexOf('-') >= 0 && timeStr.indexOf('.') >= 0) {
      // Format like "2026.4.29-5.1"
      var parts = timeStr.split('-');
      var yearMatch = timeStr.match(/^(\d{4})\./);
      var year = yearMatch ? yearMatch[1] : new Date().getFullYear().toString();
      var endPart = parts[parts.length - 1]; // e.g. "5.1"
      var endParts = endPart.split('.');
      var month = endParts[0].padStart(2, '0');
      var day = (endParts[1] || '28').padStart(2, '0');
      endDate = year + '-' + month + '-' + day;
    } else if (timeStr.match(/^\d{4}-\d{2}-\d{2}/)) {
      endDate = timeStr.slice(0, 10);
    } else {
      // Fallback: use date field
      endDate = e.date || '';
    }
    return endDate >= now;
  });

  let html = '<div class="section-title">📅 区域活动 <span class="badge">' + upcoming.length + '</span></div>';
  if (upcoming.length === 0) {
    html += '<div class="empty">近期无即将举办的活动</div>';
  } else {
    upcoming.forEach(e => {
      const parts = e.time.split(/[\s\/]/);
      html += `
        <div class="event-item">
          <div class="event-date">
            <div class="day">${parts[0]}</div>
            <div class="month">${e.location}</div>
          </div>
          <div class="event-info">
            <div class="e-name">${e.name}</div>
            <div class="e-loc">📍 ${e.location} · ${e.time}</div>
            <div class="e-note">${e.note || e.relevance || ''}</div>
          </div>
        </div>`;
    });
  }
  el.innerHTML = html;
}

// Render personnel (sorted: 国家级 first, then by total count desc)
function renderPersonnel() {
  const el = document.getElementById('personnelList');
  const items = DATA.personnel || [];
  const filtered = items.filter(p => {
    if (currentDate !== 'all' && p.date !== currentDate) return false;
    if (currentProvince !== 'all' && p.province !== currentProvince) return false;
    return true;
  });
  if (!filtered.length) { el.innerHTML = '<div class="empty">暂无符合条件的人事变动</div>'; return; }

  // Sort: 国家级 first, then has analysis (vice-minister+), then by total people count desc
  const provOrder = {'国家级':0};
  filtered.sort((a,b) => {
    const pa = provOrder[a.province] !== undefined ? provOrder[a.province] : 1;
    const pb = provOrder[b.province] !== undefined ? provOrder[b.province] : 1;
    if (pa !== pb) return pa - pb;
    // Has vice-minister analysis
    const hasAnalysisA = (a.appointments||[]).some(x=>x.analysis) || (a.removals||[]).some(x=>x.analysis);
    const hasAnalysisB = (b.appointments||[]).some(x=>x.analysis) || (b.removals||[]).some(x=>x.analysis);
    if (hasAnalysisA !== hasAnalysisB) return hasAnalysisA ? -1 : 1;
    const ca = (a.appointments?a.appointments.length:0) + (a.removals?a.removals.length:0);
    const cb = (b.appointments?b.appointments.length:0) + (b.removals?b.removals.length:0);
    return cb - ca;
  });

  let html = '<div class="section-title">👤 人事变动 <span class="badge">' + filtered.length + '批</span></div>';
  filtered.forEach(p => {
    const apptCount = p.appointments ? p.appointments.length : 0;

    const bfClass = p.isBackfill ? ' backfill' : '';

    if (apptCount > 0) {
      html += `
        <div class="p-section">
          <div class="p-section-title">✅ 任命 <span class="p-count">${apptCount}</span></div>
          <table class="p-table">
            <tr><th>姓名</th><th>新职务</th><th>原职务</th></tr>`;
      p.appointments.forEach(a => {
        var searchLink = 'https://www.baidu.com/s?wd=' + encodeURIComponent(a.name + ' ' + a.newRole);
        html += `<tr><td><a href="javascript:void(0)" onclick="window.open('${searchLink}','_blank')" class="name-link">${a.name}</a></td><td>${a.newRole}</td><td><span class="note">${a.prevRole||''}</span></td></tr>`;
      });
      html += '</table></div>';
      // Render analysis cards for appointments with analysis
      p.appointments.forEach(a => {
        if (a.analysis) html += renderAnalysis(a.name, a.analysis);
      });
    }
    if (rmvCount > 0) {
      html += `
        <div class="p-section">
          <div class="p-section-title">❌ 免职 <span class="p-count">${rmvCount}</span></div>
          <table class="p-table">
            <tr><th>姓名</th><th>原职务</th></tr>`;
      p.removals.forEach(r => {
        var searchLink = 'https://www.baidu.com/s?wd=' + encodeURIComponent(r.name + ' ' + (r.prevRole||''));
        html += `<tr><td><a href="javascript:void(0)" onclick="window.open('${searchLink}','_blank')" class="name-link">${r.name}</a></td><td>${r.prevRole||''}</td></tr>`;
      });
      html += '</table></div>';
      // Render analysis cards for removals with analysis
      p.removals.forEach(r => {
        if (r.analysis) html += renderAnalysis(r.name, r.analysis);
      });
    }
    if (p.url) { html += `<a class="p-link" href="${p.url}" target="_blank">🔗 查看原文 →</a>`; }
    html += '</div>';
  });
  el.innerHTML = html;
}

  var el = document.getElementById('digestList');

  var targetDate = currentDate !== 'all' ? currentDate : dates[0];
  var weekdays = ['\u65E5','\u4E00','\u4E8C','\u4E09','\u56DB','\u4E94','\u516D'];
  var dt = new Date(targetDate);
  var dateLabel = targetDate + '\uFF08\u5468' + weekdays[dt.getDay()] + '\uFF09';

  // 腾讯关联度关键词（用于判断是否与腾讯高关联）
  var txKeywords = ['腾讯','微信','元宝','混元','Hy3','视频号','小程序','企业微信','QQ','WeChat','腾讯云','游戏版号','直播','平台经济','内容审核','短视频标注','AI生成内容'];

  function hasTxRelevance(text) {
    if (!text) return false;
    for (var i = 0; i < txKeywords.length; i++) {
      if (text.indexOf(txKeywords[i]) >= 0) return true;
    }
    return false;
  }

  var items = [];

  // 1. 一级紧急预警（始终最高优先）
  DATA.alerts.forEach(function(a, i) {
    if (a.level.indexOf('\u4E00\u7EA7') >= 0) {
      items.push({type:'alert',tag:'\u7D27\u6025\u9884\u8B66',tagClass:'d-tag-alert',headline:a.item,title:a.item,summary:a.assessment,priority:0,idx:i});
    }
  });

  // 2. 高影响政策（对腾讯高影响 = impact为高）
  DATA.entries.filter(function(e) { return e.date === targetDate && e.impact === '\u9AD8'; }).forEach(function(e) {
    var eid = e.id || ('entry-title-' + encodeURIComponent((e.title||'').substring(0,20)));
    var dTitle = e.headline || e.title;
    var provPrefix = e.province ? '【' + e.province + '】' : '';
    items.push({type:'policy',tag:'\u91CD\u8981\u653F\u7B56',tagClass:'d-tag-policy',headline:provPrefix + dTitle,title:dTitle,summary:e.summary,meta:e.source,priority:1,id:eid,entryTitle:e.title});
  });

  // 3. 中影响但与腾讯高关联的政策
  DATA.entries.filter(function(e) { return e.date === targetDate && e.impact === '\u4E2D' && hasTxRelevance(e.title + e.summary); }).forEach(function(e) {
    var eid = e.id || ('entry-title-' + encodeURIComponent((e.title||'').substring(0,20)));
    var dTitle = e.headline || e.title;
    var provPrefix = e.province ? '【' + e.province + '】' : '';
    items.push({type:'policy',tag:'\u8154\u8baf\u76f8\u5173',tagClass:'d-tag-policy',headline:provPrefix + dTitle,title:dTitle,summary:e.summary,meta:e.source,priority:2,id:eid,entryTitle:e.title});
  });

  // 4. 友商动态（仅T0-T1核心公司 + 重大经营动向关键词）
  var topCompanies = {'\u817E\u8BAF':0,'DeepSeek':1,'OpenAI':2,'Anthropic':3,'\u963f\u91cc\u5df4\u5df4':4,'\u5b57\u8282\u8df3\u52a8':5,'\u534e\u4e3a':6,'\u667a\u8c31AI':7};
  var majorKeywords = ['融资','估值','收购','并购','IPO','上市','财报','营收','利润','战略','重组','裁员','关停','合资','Agent Mode','开源','首发','登顶','突破','第一'];
  DATA.competitors.filter(function(c) { return c.date === targetDate; }).forEach(function(c) {
    // 只收录T0-T1公司，或内容含重大经营动向关键词的
    var isTopComp = topCompanies[c.name] !== undefined;
    var isMajor = false;
    if (!isTopComp) {
      var content = (c.title || '') + (c.update || '');
      for (var mk = 0; mk < majorKeywords.length; mk++) {
        if (content.indexOf(majorKeywords[mk]) >= 0) { isMajor = true; break; }
      }
    }
    if (!isTopComp && !isMajor) return; // 非重要公司且非重大内容，不进导读

    var cp = topCompanies[c.name] !== undefined ? topCompanies[c.name] : 10;
    var dTitle = c.title ? c.name + ' | ' + c.title : c.name + '\u6700\u65B0\u52A8\u6001';
    var headlineText = c.title ? c.name + '：' + c.title : c.name + '\u6700\u65B0\u52A8\u6001';
    items.push({type:'competitor',tag:'\u884C\u4E1A\u52A8\u6001',tagClass:'d-tag-industry',headline:headlineText,title:dTitle,summary:c.update||'',meta:c.date,priority:3 + cp * 0.1,name:c.name});
  });

  // 5. 当日人事变动（仅副部级以上：国务院任免 / 省委常委 / 省长副省长）
  var viceMinisterKeywords = ['国务院','副部','部长','省委常委','省长','副省长','省委书记','省委副书记'];
  DATA.personnel.filter(function(p) { return p.date === targetDate; }).forEach(function(p) {
    // 只有省份为国家级，或标题/职务包含副部级以上关键词才进入导读
    var isViceMinister = false;
    if (p.province === '国家级') { isViceMinister = true; }
    if (!isViceMinister) {
      var combined = p.title || '';
      for (var k = 0; k < viceMinisterKeywords.length; k++) {
        if (combined.indexOf(viceMinisterKeywords[k]) >= 0) { isViceMinister = true; break; }
      }
    }
    if (!isViceMinister && p.appointments) {
      p.appointments.forEach(function(a) {
        var role = (a.newRole || '');
        if (role.indexOf('副部') >= 0 || role.indexOf('部长') >= 0 || role.indexOf('省长') >= 0 || role.indexOf('省委常委') >= 0) {
          isViceMinister = true;
        }
      });
    }
    if (!isViceMinister) return; // 非副部级以上，不进入导读

    var keyNames = [];
    if (p.appointments) p.appointments.slice(0,3).forEach(function(a) {
      keyNames.push(a.name + ' \u2192 ' + a.newRole);
    });
    if (keyNames.length > 0) {
      items.push({type:'personnel',tag:'\u4EBA\u4E8B\u53D8\u52A8',tagClass:'d-tag-personnel',headline:p.title,title:p.title,summary:keyNames.join('\uFF1B'),meta:p.province,priority:5});
    }
  });

  // 排序
  items.sort(function(a, b) { return a.priority - b.priority; });

  // 渲染
  var html = '<div class="digest-date">\u{1F4F0} ' + dateLabel + ' \u6BCF\u65E5\u5BFC\u8BFB</div>';
  html += '<div style="font-size:11px;color:var(--gray);padding:0 16px 8px">\u2139\uFE0F \u4F18\u5148\u5C55\u793A\u5BF9\u817E\u8BAF\u9AD8\u5F71\u54CD/\u9AD8\u5173\u8054\u5185\u5BB9\uFF0C\u70B9\u51FB\u8DF3\u8F6C\u8BE6\u60C5</div>';

  if (items.length === 0) {
    html += '<div class="digest-empty">\u5F53\u65E5\u65E0\u91CD\u8981\u4FE1\u606F</div>';
  } else {
    items.forEach(function(item) {
      var urgentClass = item.priority === 0 ? ' urgent' : item.priority <= 1 ? ' important' : '';
      var onclick = '';
      if (item.type === 'alert') onclick = 'alertJump(' + item.idx + ')';
      else if (item.type === 'policy') onclick = "digestJumpPolicy('" + encodeURIComponent(item.entryTitle || item.title) + "')";
      else if (item.type === 'personnel') onclick = "digestJump('personnel','')";
      else if (item.type === 'competitor') onclick = "digestJumpComp('" + encodeURIComponent(item.name || '') + "')";

      var oneLiner = item.headline || item.title;
      if (oneLiner.length > 50) oneLiner = oneLiner.substring(0, 48) + '...';

      html += '<div class="digest-card' + urgentClass + '" onclick="' + onclick + '">' +
        '<span class="d-tag ' + item.tagClass + '">' + item.tag + '</span>' +
        '<span class="d-text">' + oneLiner + '</span>' +
        '<span class="d-arrow">\u203A</span>' +
        '</div>';
    });
  }

  el.innerHTML = html;
}

// 导读跳转：通过标题匹配找到卡片（解决id缺失问题）
function digestJumpPolicy(encodedTitle) {
  var title = decodeURIComponent(encodedTitle);
  switchToPanel('panelPolicy');
  setTimeout(function() {
    var cards = document.querySelectorAll('.card');
    var target = null;
    cards.forEach(function(c) {
      var cardTitle = c.querySelector('.card-title');
      if (cardTitle && cardTitle.textContent === title) target = c;
    });
    if (target) {
      target.scrollIntoView({behavior:'smooth', block:'center'});
      target.classList.add('highlight');
      setTimeout(function() { target.classList.remove('highlight'); }, 2000);
    }
  }, 150);
}

function digestJumpComp(encodedName) {
  var name = decodeURIComponent(encodedName);
  switchToPanel('panelCompetitor');
  setTimeout(function() {
    var comps = document.querySelectorAll('.comp-card');
    var target = null;
    comps.forEach(function(c) {
      if (c.getAttribute('data-name') === name) target = c;
    });
    if (target) {
      target.scrollIntoView({behavior:'smooth', block:'center'});
      target.classList.add('highlight');
      setTimeout(function() { target.classList.remove('highlight'); }, 2000);
    }
  }, 150);
}

function switchToPanel(panelId) {
  currentDate = 'all'; currentProvince = 'all';
  renderAll();
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var tabEl = document.querySelector('[data-panel="' + panelId + '"]');
  if (tabEl) tabEl.classList.add('active');
  var panelEl = document.getElementById(panelId);
  if (panelEl) panelEl.classList.add('active');
}

function renderAll() {
  renderDatePicker();
  renderFilters();
  renderStats();
  renderDigest();
  renderPolicies();
  renderAlerts();
  renderPersonnel();
  renderCompetitors();
  renderEvents();
  renderLeaderActivities();
}

// ========== 月报导出功能 ==========
function showExportModal() {
  document.getElementById('exportMask').style.display = 'block';
  document.getElementById('exportModal').style.display = 'block';
  document.getElementById('exportStatus').textContent = '';
  // 填充月份选择器
  var months = [...new Set(DATA.entries.map(e => e.date ? e.date.substring(0,7) : ''))].filter(Boolean).sort().reverse();
  var sel = document.getElementById('exportMonth');
  sel.innerHTML = months.map(m => '<option value="' + m + '">' + m + '</option>').join('');
}
function hideExportModal() {
  document.getElementById('exportMask').style.display = 'none';
  document.getElementById('exportModal').style.display = 'none';
}

function doExport() {
  var month = document.getElementById('exportMonth').value;
  var email = document.getElementById('exportEmail').value.trim();
  var statusEl = document.getElementById('exportStatus');
  if (!month) { statusEl.textContent = '请选择月份'; return; }
  if (!email || email.indexOf('@') < 0) { statusEl.textContent = '请输入有效邮箱'; return; }
  statusEl.textContent = '正在生成Excel...';
  statusEl.style.color = 'var(--gray)';

  generateMonthlyExcel(month).then(function(result) {
    var base64 = result.base64;
    var fileName = '华东政务信息' + month + '.xlsx';
    statusEl.textContent = '正在发送邮件...';

    fetch('/api/send-email', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: email, fileName: fileName, fileBase64: base64 })
    }).then(function(resp) { return resp.json(); }).then(function(data) {
      if (data.success) {
        statusEl.textContent = '已发送至 ' + email;
        statusEl.style.color = 'var(--green)';
      } else {
        statusEl.textContent = '邮件发送失败，已下载到本地：' + (data.error || '');
        statusEl.style.color = 'var(--orange)';
        downloadFromBase64(base64, fileName);
      }
    }).catch(function(err) {
      statusEl.textContent = '网络异常，已下载到本地';
      statusEl.style.color = 'var(--orange)';
      downloadFromBase64(base64, fileName);
    });
  }).catch(function(e) {
    statusEl.textContent = '生成失败：' + e.message;
    statusEl.style.color = 'var(--red)';
  });
}

function downloadFromBase64(base64, fileName) {
  var byteString = atob(base64);
  var ab = new ArrayBuffer(byteString.length);
  var ia = new Uint8Array(ab);
  for (var i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
  var blob = new Blob([ab], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  URL.revokeObjectURL(url);
}

function downloadExcel(wb, fileName) {
  var wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  var blob = new Blob([wbout], {type:'application/octet-stream'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
}

async function generateMonthlyExcel(month) {
  var provList = ["上海","江苏","浙江","安徽","福建","江西","湖南"];
  var viceMinKw = ["副部","部长","省委常委","省长","副省长","省委书记","省委副书记"];
  var overseasComps = ["OpenAI","Anthropic","Google","Meta","Apple","Microsoft","NVIDIA","AMD","Intel","ARM","TSMC"];
  var provCities = {"上海":["上海"],"江苏":["南京","苏州","无锡","常州","南通","徐州","扬州","镇江","盐城","泰州"],"浙江":["杭州","宁波","温州","嘉兴","绍兴","义乌","金华","台州"],"安徽":["合肥","芜湖","蚌埠","安庆","马鞍山","阜阳"],"福建":["福州","厦门","泉州","漳州","莆田","南平","龙岩","宁德"],"江西":["南昌","九江","赣州","景德镇","上饶","宜春","萍乡"],"湖南":["长沙","株洲","湘潭","岳阳","衡阳","郴州","常德","永州","怀化"]};
  var compHomeMap = {"商汤":"上海","MiniMax":"上海","阿里巴巴":"浙江","网易":"浙江","科大讯飞":"安徽","智谱AI":"上海"};
  var notPolicyKw = ["签署","签约","合作协议","战略合作","会见","会谈","座谈","调研"];
  var personnelKw = ["人事","任免","公示","任前","干部"];
  var provCapitals = {"上海":["上海"],"江苏":["江苏","南京"],"浙江":["浙江","杭州"],"安徽":["安徽","合肥"],"福建":["福建","福州"],"江西":["江西","南昌"],"湖南":["湖南","长沙"]};

  // 样式定义
  var thinBorder = {top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
  var titleFont = {bold:true, size:12, name:'微软雅黑'};
  var headerFont = {bold:true, size:9, name:'微软雅黑', color:{argb:'FFFFFFFF'}};
  var headerFill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFC00000'}};
  var dataFont = {size:9, name:'微软雅黑'};
  var linkFont = {size:8, name:'微软雅黑', color:{argb:'FF0563C1'}};

  // 数据构建
  var allRows = []; // [{type, cells:[]}]
  var merges = [];
  var monthLabel = month.replace("-","年") + "月";
  allRows.push({type:'title', cells:["华东政务信息（" + monthLabel + "）","","","",""]});
  merges.push({s:{r:1,c:1},e:{r:1,c:5}});

  provList.forEach(function(prov) {
    var cities = provCities[prov] || [];
    var allowedPrefixes = provCapitals[prov] || [prov];
    var seenKeys = {};
    allRows.push({type:'header', cells:["区  域","项  目","信  息","新闻链接","解  读"]});
    var sections = [];

    // 1. 重要人事变动
    seenKeys = {};
    var hrItems = [];
    (DATA.personnel || []).filter(function(p){return p.date&&p.date.startsWith(month)&&p.province===prov;}).forEach(function(p){
      if(p.appointments) p.appointments.forEach(function(a){
        if(!a.name) return;
        var role = a.newRole||"";
        var isVice = false;
        viceMinKw.forEach(function(kw){if(role.indexOf(kw)>=0) isVice=true;});
        if(!isVice) return;
        var key = a.name+role;
        if(seenKeys[key]) return; seenKeys[key]=true;
        var bio = (a.analysis&&a.analysis.bio)?a.analysis.bio:(a.prevRole?a.name+"，"+a.prevRole:"");
        hrItems.push([a.name+"任"+a.newRole, p.url||"", bio]);
      });
    });
    sections.push({name:"重要人事变动", items:hrItems});

    // 2. 主要领导动态
    seenKeys = {};
    var ldItems = [];
    (DATA.leader_activities||[]).filter(function(la){return la.date&&la.date.startsWith(month)&&la.province===prov;}).forEach(function(la){
      var key = la.leader+la.title;
      if(seenKeys[key]) return; seenKeys[key]=true;
      var info = la.leader+la.type+la.title;
      var parts = [];
      if(la.date) parts.push(la.date.replace("2026-","").replace("-","月")+"日");
      if(la.counterpart) parts.push(la.leader+"与"+la.counterpart+"举行"+la.type);
      if(la.summary) parts.push(la.summary);
      ldItems.push([info, la.url||"", parts.join("，")+"。"]);
    });
    sections.push({name:"主要领导动态及政策导向", items:ldItems});

    // 3. 重大政策
    seenKeys = {};
    var polItems = [];
    var indOverflow = [];
    (DATA.entries||[]).filter(function(e){return e.date&&e.date.startsWith(month)&&e.province===prov&&(e.impact==="高"||e.impact==="中");}).forEach(function(e){
      if(seenKeys[e.title]) return; seenKeys[e.title]=true;
      var title = e.title||"";
      var isPersonnel = false;
      personnelKw.forEach(function(kw){if(title.indexOf(kw)>=0) isPersonnel=true;});
      if(isPersonnel) return;
      var isNotPolicy = false;
      notPolicyKw.forEach(function(kw){if(title.indexOf(kw)>=0) isNotPolicy=true;});
      var isLocalCity = false;
      var localCities = cities.filter(function(c){return allowedPrefixes.indexOf(c)<0;});
      localCities.forEach(function(c){if(title.indexOf(c)===0||title.indexOf(c+"市")>=0) isLocalCity=true;});
      var datePart = e.publishDate?e.publishDate.replace("2026-","").replace("-","月")+"日发布。":"";
      var note = datePart + (e.summary||"");
      if(isNotPolicy||isLocalCity){indOverflow.push([title, e.url||"", note]); return;}
      polItems.push([title, e.url||"", note]);
    });
    sections.push({name:"重大政策", items:polItems});

    // 4. 行业信息
    seenKeys = {};
    var indItems = [];
    indOverflow.forEach(function(item){if(seenKeys[item[0]]) return; seenKeys[item[0]]=true; indItems.push(item);});
    (DATA.events||[]).filter(function(ev){
      for(var i=0;i<cities.length;i++){if((ev.location||"").indexOf(cities[i])>=0) return true;}
      return false;
    }).forEach(function(ev){
      if(seenKeys[ev.name]) return; seenKeys[ev.name]=true;
      indItems.push([ev.name, "", (ev.time?ev.time+"，":"")+(ev.location||"")+"。"+(ev.relevance||ev.note||"")]);
    });
    sections.push({name:"行业信息", items:indItems});

    // 5. 友商动态
    seenKeys = {};
    var compItems = [];
    (DATA.competitors||[]).filter(function(c){
      if(!c.date||!c.date.startsWith(month)) return false;
      for(var i=0;i<overseasComps.length;i++){if(c.name===overseasComps[i]) return false;}
      if(c.name==="腾讯"||c.name==="微信"||c.name==="行业格局"||c.name==="其他") return false;
      if(c.province===prov) return true;
      if(compHomeMap[c.name]===prov) return true;
      var content = (c.title||"")+(c.update||"");
      for(var ci=0;ci<cities.length;ci++){if(content.indexOf(cities[ci])>=0) return true;}
      return false;
    }).forEach(function(c){
      var key = c.name+(c.title||"");
      if(seenKeys[key]) return; seenKeys[key]=true;
      compItems.push([c.name+(c.title?"："+c.title:""), c.url||"", c.update||""]);
    });
    sections.push({name:"友商动态", items:compItems});

    // 写入行+合并
    var provStartRow = allRows.length + 1;
    var provTotalRows = 0;
    sections.forEach(function(sec){
      var secStartRow = allRows.length + 1;
      if(sec.items.length===0){
        allRows.push({type:'data', cells:["", sec.name, "", "", ""]});
        provTotalRows++;
      } else {
        sec.items.forEach(function(item,idx){
          allRows.push({type:'data', cells:["", idx===0?sec.name:"", item[0], item[1], item[2]]});
          provTotalRows++;
        });
        if(sec.items.length>1){
          merges.push({s:{r:secStartRow,c:2},e:{r:secStartRow+sec.items.length-1,c:2}});
        }
      }
    });
    allRows[provStartRow-1].cells[0] = prov;
    if(provTotalRows>1){
      merges.push({s:{r:provStartRow,c:1},e:{r:provStartRow+provTotalRows-1,c:1}});
    }
  });

  // 使用 ExcelJS 生成带样式工作簿
  var workbook = new ExcelJS.Workbook();
  var ws = workbook.addWorksheet('Sheet1');

  // 列宽（A4横版PDF优化）
  ws.columns = [{width:6},{width:13},{width:45},{width:20},{width:60}];

  // 页面设置
  ws.pageSetup = {paperSize:9, orientation:'landscape', fitToPage:true, fitToWidth:1, fitToHeight:0,
    margins:{left:0.4,right:0.4,top:0.5,bottom:0.5,header:0.3,footer:0.3}};

  // 写入数据
  allRows.forEach(function(row) {
    var excelRow = ws.addRow(row.cells);
    if (row.type === 'title') {
      excelRow.height = 28;
      excelRow.eachCell({includeEmpty:true}, function(cell) {
        cell.font = titleFont;
        cell.alignment = {vertical:'middle', horizontal:'center'};
        cell.border = thinBorder;
      });
    } else if (row.type === 'header') {
      excelRow.height = 20;
      excelRow.eachCell({includeEmpty:true}, function(cell) {
        cell.font = headerFont;
        cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true};
        cell.border = thinBorder;
        cell.fill = headerFill;
      });
    } else {
      excelRow.eachCell({includeEmpty:true}, function(cell, colNumber) {
        cell.border = thinBorder;
        if (colNumber <= 2) {
          cell.font = dataFont;
          cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true};
        } else if (colNumber === 3) {
          cell.font = dataFont;
          cell.alignment = {vertical:'middle', horizontal:'left', wrapText:true};
        } else if (colNumber === 4) {
          cell.font = linkFont;
          cell.alignment = {vertical:'middle', horizontal:'left', wrapText:true};
        } else {
          cell.font = dataFont;
          cell.alignment = {vertical:'middle', horizontal:'left', wrapText:true};
        }
      });
    }
  });

  // 合并单元格
  merges.forEach(function(m) {
    ws.mergeCells(m.s.r, m.s.c, m.e.r, m.e.c);
    var cell = ws.getCell(m.s.r, m.s.c);
    cell.border = thinBorder;
    if (m.s.c <= 2) cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true};
  });

  // 导出为 base64
  var buffer = await workbook.xlsx.writeBuffer();
  var binary = '';
  var bytes = new Uint8Array(buffer);
  for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  var base64 = btoa(binary);
  return {base64: base64, buffer: buffer};
}

// Init
renderAll();

// 强制所有外部链接在新窗口打开（兼容微信/手机浏览器）
document.addEventListener('click', function(e) {
  var a = e.target.closest('a[href]');
  if (a && a.href && a.href.indexOf('http') === 0 && a.href.indexOf(location.host) === -1) {
    e.preventDefault();
    window.open(a.href, '_blank');
  }
});
</script>
</body>
</html>
